<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Vault — Liquid Glass Monokrom</title>

    <!-- Google Fonts: Inter + Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #0a0a0b;
            --bg-surface: #111114;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-bg-hover: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-hover: rgba(255, 255, 255, 0.16);
            --glass-bg-card: rgba(255, 255, 255, 0.025);
            --text-primary: #e8e8ec;
            --text-secondary: #a0a0aa;
            --text-tertiary: #6b6b75;
            --accent: #f0f0f5;
            --accent-dim: #c0c0cc;
            --danger: #ff4d6a;
            --danger-bg: rgba(255, 77, 106, 0.1);
            --success: #5eeea0;
            --success-bg: rgba(94, 238, 160, 0.1);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.5);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.45);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.6);
            --shadow-glow: 0 0 0 1px rgba(255, 255, 255, 0.05), 0 8px 32px rgba(0, 0, 0, 0.5);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 22px;
            --radius-xl: 28px;
            --transition-fast: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: 0.45s cubic-bezier(0.22, 1, 0.36, 1);
            --font-heading: 'Plus Jakarta Sans', sans-serif;
            --font-body: 'Inter', sans-serif;
            --blur-glass: blur(40px);
            --blur-card: blur(24px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: relative;
        }

        /* === Ambient Background Orbs === */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
            animation: orbDrift 18s ease-in-out infinite;
        }
        .bg-orb.orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(180, 180, 200, 0.35) 0%, transparent 70%);
            top: -15%;
            left: -10%;
            animation-delay: 0s;
        }
        .bg-orb.orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(140, 140, 160, 0.3) 0%, transparent 70%);
            bottom: -12%;
            right: -8%;
            animation-delay: -7s;
            animation-duration: 22s;
        }
        .bg-orb.orb-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(200, 200, 210, 0.25) 0%, transparent 70%);
            top: 50%;
            left: 55%;
            animation-delay: -13s;
            animation-duration: 20s;
        }

        @keyframes orbDrift {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(60px, -40px) scale(1.15);
            }
            50% {
                transform: translate(-30px, 50px) scale(0.9);
            }
            75% {
                transform: translate(-50px, -30px) scale(1.08);
            }
        }

        /* === Grid Noise Overlay === */
        .noise-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 200px 200px;
        }

        /* === Main App Container === */
        #app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        /* === LOGIN SCREEN === */
        #login-screen {
            width: 100%;
            max-width: 440px;
            animation: fadeSlideIn 0.6s var(--transition-spring);
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(28px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeSlideOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-20px);
            }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: var(--blur-glass);
            -webkit-backdrop-filter: var(--blur-glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 44px 36px 38px;
            box-shadow: var(--shadow-glow);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 20%;
            right: 20%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            border-radius: 50%;
        }
        .login-card .icon-vault {
            width: 56px;
            height: 56px;
            margin: 0 auto 18px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: var(--text-primary);
            transition: var(--transition-smooth);
        }
        .login-card:hover .icon-vault {
            border-color: var(--glass-border-hover);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.04);
        }
        .login-card h1 {
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 1.65rem;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            margin-bottom: 6px;
        }
        .login-card .subtitle {
            font-size: 0.875rem;
            color: var(--text-tertiary);
            margin-bottom: 28px;
            letter-spacing: 0.01em;
        }
        .login-card .input-group {
            text-align: left;
            margin-bottom: 16px;
        }
        .login-card .input-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 7px;
            font-family: var(--font-heading);
        }
        .login-card input {
            width: 100%;
            padding: 13px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition-fast);
            letter-spacing: 0.01em;
        }
        .login-card input::placeholder {
            color: var(--text-tertiary);
            font-size: 0.85rem;
        }
        .login-card input:focus {
            border-color: rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.03);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 13px 24px;
            border-radius: var(--radius-sm);
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.01em;
            cursor: pointer;
            border: none;
            outline: none;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            white-space: nowrap;
            user-select: none;
        }
        .btn-primary {
            background: rgba(255, 255, 255, 0.9);
            color: #0a0a0b;
            box-shadow: var(--shadow-sm);
            width: 100%;
            font-weight: 700;
        }
        .btn-primary:hover {
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }
        .btn-primary:active {
            transform: scale(0.97);
            transition: var(--transition-fast);
        }
        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--glass-border);
            width: 100%;
            margin-top: 8px;
            font-weight: 500;
        }
        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--glass-border-hover);
            color: var(--text-primary);
        }
        .login-error {
            color: var(--danger);
            font-size: 0.8rem;
            margin-top: 4px;
            min-height: 20px;
            text-align: center;
            letter-spacing: 0.01em;
        }

        /* === DASHBOARD === */
        #dashboard-screen {
            width: 100%;
            display: none;
            flex-direction: column;
            gap: 22px;
            animation: fadeInUp 0.5s var(--transition-spring);
        }
        #dashboard-screen.active {
            display: flex;
        }

        /* Top Nav */
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 14px;
            background: var(--glass-bg);
            backdrop-filter: var(--blur-glass);
            -webkit-backdrop-filter: var(--blur-glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 16px 22px;
            box-shadow: var(--shadow-glow);
        }
        .top-nav .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .top-nav .brand .logo-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 16px rgba(255, 255, 255, 0.4);
        }
        .top-nav .brand span {
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.01em;
        }
        .top-nav .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .top-nav .role-badge {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 6px 13px;
            border-radius: 20px;
            font-family: var(--font-heading);
        }
        .role-admin {
            background: rgba(255, 255, 255, 0.1);
            color: var(--accent);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .role-user {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-secondary);
            border: 1px solid var(--glass-border);
        }
        .btn-sm {
            padding: 8px 16px;
            font-size: 0.78rem;
            border-radius: 20px;
            font-weight: 600;
            font-family: var(--font-heading);
            cursor: pointer;
            border: 1px solid var(--glass-border);
            background: transparent;
            color: var(--text-secondary);
            transition: var(--transition-smooth);
            letter-spacing: 0.02em;
        }
        .btn-sm:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--glass-border-hover);
            color: var(--text-primary);
        }
        .btn-sm.btn-danger {
            border-color: rgba(255, 77, 106, 0.3);
            color: var(--danger);
        }
        .btn-sm.btn-danger:hover {
            background: var(--danger-bg);
            border-color: rgba(255, 77, 106, 0.5);
        }

        /* Upload Section (Admin) */
        .upload-section {
            background: var(--glass-bg);
            backdrop-filter: var(--blur-glass);
            -webkit-backdrop-filter: var(--blur-glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 24px 26px;
            box-shadow: var(--shadow-glow);
            display: none;
            flex-direction: column;
            gap: 14px;
            animation: fadeInUp 0.4s var(--transition-spring);
        }
        .upload-section.visible {
            display: flex;
        }
        .upload-section h3 {
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: -0.01em;
            color: var(--text-primary);
        }
        .upload-section input,
        .upload-section textarea {
            width: 100%;
            padding: 12px 15px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.025);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.9rem;
            outline: none;
            resize: vertical;
            transition: var(--transition-fast);
            letter-spacing: 0.01em;
        }
        .upload-section textarea {
            min-height: 120px;
            line-height: 1.55;
        }
        .upload-section input:focus,
        .upload-section textarea:focus {
            border-color: rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.02);
        }
        .upload-section input::placeholder,
        .upload-section textarea::placeholder {
            color: var(--text-tertiary);
            font-size: 0.83rem;
        }
        .btn-upload {
            align-self: flex-end;
            padding: 10px 22px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.85);
            color: #0a0a0b;
            font-weight: 700;
            font-family: var(--font-heading);
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            letter-spacing: 0.01em;
            transition: var(--transition-smooth);
        }
        .btn-upload:hover {
            background: #fff;
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.18);
            transform: translateY(-1px);
        }
        .btn-upload:active {
            transform: scale(0.96);
            transition: var(--transition-fast);
        }

        /* Stats / Count */
        .prompt-count-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-tertiary);
            letter-spacing: 0.02em;
            font-weight: 500;
            padding: 0 4px;
        }
        .prompt-count-bar .count-num {
            font-weight: 700;
            color: var(--text-secondary);
            font-family: var(--font-heading);
            font-size: 0.9rem;
        }

        /* Prompts Grid */
        .prompts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
            width: 100%;
        }
        @media (min-width: 640px) {
            .prompts-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* Prompt Card */
        .prompt-card {
            background: var(--glass-bg-card);
            backdrop-filter: var(--blur-card);
            -webkit-backdrop-filter: var(--blur-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 20px 22px 18px;
            box-shadow: var(--shadow-md);
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: fadeInUp 0.4s var(--transition-spring);
        }
        .prompt-card:hover {
            border-color: var(--glass-border-hover);
            background: var(--glass-bg-hover);
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255, 255, 255, 0.04);
            transform: translateY(-2px);
        }
        .prompt-card .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
        }
        .prompt-card .card-title {
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: -0.01em;
            color: var(--text-primary);
            word-break: break-word;
            line-height: 1.3;
            flex: 1;
        }
        .prompt-card .card-date {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            white-space: nowrap;
            letter-spacing: 0.02em;
            font-weight: 500;
        }
        .prompt-card .card-body {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.55;
            word-break: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            letter-spacing: 0.01em;
        }
        .prompt-card .card-body.expanded {
            -webkit-line-clamp: unset;
            display: block;
        }
        .prompt-card .card-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }
        .btn-action {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 7px 13px;
            border-radius: 18px;
            font-size: 0.75rem;
            font-weight: 600;
            font-family: var(--font-heading);
            letter-spacing: 0.02em;
            cursor: pointer;
            border: 1px solid var(--glass-border);
            background: transparent;
            color: var(--text-secondary);
            transition: var(--transition-smooth);
            white-space: nowrap;
        }
        .btn-action:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--glass-border-hover);
            color: var(--text-primary);
        }
        .btn-action.btn-copy:hover {
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
        }
        .btn-action.btn-download:hover {
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
        }
        .btn-action.btn-delete {
            color: var(--danger);
            border-color: rgba(255, 77, 106, 0.2);
        }
        .btn-action.btn-delete:hover {
            background: var(--danger-bg);
            border-color: rgba(255, 77, 106, 0.45);
            color: #ff6b82;
        }
        .btn-action.btn-expand {
            color: var(--text-tertiary);
            border: none;
            padding: 5px 8px;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .btn-action.btn-expand:hover {
            color: var(--text-secondary);
            background: transparent;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-tertiary);
            grid-column: 1 / -1;
            animation: fadeInUp 0.5s var(--transition-spring);
        }
        .empty-state .empty-icon {
            font-size: 48px;
            margin-bottom: 14px;
            opacity: 0.5;
        }
        .empty-state p {
            font-size: 0.9rem;
            letter-spacing: 0.01em;
            font-weight: 500;
        }

        /* Toast */
        #toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            pointer-events: auto;
            background: var(--glass-bg);
            backdrop-filter: var(--blur-glass);
            -webkit-backdrop-filter: var(--blur-glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            padding: 14px 20px;
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 0.82rem;
            letter-spacing: 0.01em;
            color: var(--text-primary);
            box-shadow: var(--shadow-lg);
            animation: toastIn 0.4s var(--transition-spring), toastOut 0.35s var(--transition-spring) 2.5s forwards;
            min-width: 240px;
            max-width: 380px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .toast.success {
            border-left: 3px solid var(--success);
        }
        .toast.error {
            border-left: 3px solid var(--danger);
        }
        .toast.info {
            border-left: 3px solid var(--accent-dim);
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(60px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }
            to {
                opacity: 0;
                transform: translateX(40px);
            }
        }

        /* Responsive */
        @media (max-width: 500px) {
            .login-card {
                padding: 30px 20px 28px;
                border-radius: var(--radius-lg);
            }
            .login-card h1 {
                font-size: 1.35rem;
            }
            .top-nav {
                padding: 14px 16px;
                border-radius: var(--radius-md);
            }
            .prompt-card {
                padding: 16px 16px 14px;
            }
            .prompt-card .card-title {
                font-size: 0.9rem;
            }
            .btn-action {
                font-size: 0.7rem;
                padding: 6px 10px;
            }
        }
    </style>
</head>
<body>

    <!-- Ambient Background Orbs -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>
    <div class="noise-overlay"></div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- App Container -->
    <div id="app-container">

        <!-- ============ LOGIN SCREEN ============ -->
        <div id="login-screen">
            <div class="login-card">
                <div class="icon-vault">🔐</div>
                <h1>Prompt Vault</h1>
                <p class="subtitle">Liquid Glass Monokrom &middot; Masuk untuk melanjutkan</p>
                <div class="input-group">
                    <label for="username-input">Username</label>
                    <input type="text" id="username-input" placeholder="Masukkan username..." autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="password-input">Password</label>
                    <input type="password" id="password-input" placeholder="Masukkan password..." autocomplete="off">
                </div>
                <div class="login-error" id="login-error"></div>
                <button class="btn btn-primary" id="btn-login" onclick="handleLogin()">
                    <span>🔑</span> Masuk
                </button>
                <button class="btn btn-ghost" id="btn-guest" onclick="loginAsGuest()">
                    <span>👤</span> Masuk sebagai User Biasa
                </button>
                <p style="font-size:0.68rem;color:var(--text-tertiary);margin-top:12px;letter-spacing:0.02em;">
                    Admin: <strong style="color:var(--text-secondary);">BilzxAdm123</strong> / <strong style="color:var(--text-secondary);">ExAdm</strong>
                </p>
            </div>
        </div>

        <!-- ============ DASHBOARD SCREEN ============ -->
        <div id="dashboard-screen">
            <!-- Top Navigation -->
            <nav class="top-nav">
                <div class="brand">
                    <div class="logo-dot"></div>
                    <span>Prompt Vault</span>
                </div>
                <div class="user-info">
                    <span id="display-username" style="font-weight:600;font-size:0.85rem;letter-spacing:0.01em;"></span>
                    <span class="role-badge" id="role-badge"></span>
                    <button class="btn-sm" onclick="handleLogout()" title="Keluar">
                        <span>↪</span> Logout
                    </button>
                </div>
            </nav>

            <!-- Upload Section (Admin Only) -->
            <div class="upload-section" id="upload-section">
                <h3>📤 Upload Prompt Baru</h3>
                <input type="text" id="prompt-title-input" placeholder="Judul prompt..." maxlength="120">
                <textarea id="prompt-content-input" placeholder="Isi prompt / teks di sini..."></textarea>
                <button class="btn-upload" onclick="handleUpload()">
                    <span>↑</span> Upload Prompt
                </button>
            </div>

            <!-- Prompt Count -->
            <div class="prompt-count-bar">
                <span>📋 Total</span>
                <span class="count-num" id="prompt-count">0</span>
                <span>prompt tersimpan</span>
            </div>

            <!-- Prompts Grid -->
            <div class="prompts-grid" id="prompts-grid">
                <!-- Rendered by JS -->
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ==================== CONSTANTS ====================
            const ADMIN_CREDENTIALS = {
                username: 'BilzxAdm123',
                password: 'ExAdm',
                role: 'admin'
            };

            const STORAGE_KEY_PROMPTS = 'prompt_vault_prompts';
            const STORAGE_KEY_SESSION = 'prompt_vault_session';

            // ==================== STATE ====================
            let currentSession = null; // { username, role }
            let prompts = [];

            // ==================== DOM REFS ====================
            const loginScreen = document.getElementById('login-screen');
            const dashboardScreen = document.getElementById('dashboard-screen');
            const usernameInput = document.getElementById('username-input');
            const passwordInput = document.getElementById('password-input');
            const loginError = document.getElementById('login-error');
            const displayUsername = document.getElementById('display-username');
            const roleBadge = document.getElementById('role-badge');
            const uploadSection = document.getElementById('upload-section');
            const promptTitleInput = document.getElementById('prompt-title-input');
            const promptContentInput = document.getElementById('prompt-content-input');
            const promptsGrid = document.getElementById('prompts-grid');
            const promptCountEl = document.getElementById('prompt-count');
            const toastContainer = document.getElementById('toast-container');

            // ==================== INIT ====================
            function init() {
                loadPromptsFromStorage();
                checkExistingSession();
                // Enter key on login
                [usernameInput, passwordInput].forEach(el => {
                    el.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') handleLogin();
                    });
                });
                // Enter key on upload fields
                [promptTitleInput, promptContentInput].forEach(el => {
                    el.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' && !e.shiftKey) {
                            e.preventDefault();
                            handleUpload();
                        }
                    });
                });
            }

            function loadPromptsFromStorage() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY_PROMPTS);
                    prompts = raw ? JSON.parse(raw) : [];
                } catch (e) {
                    prompts = [];
                }
            }

            function savePromptsToStorage() {
                try {
                    localStorage.setItem(STORAGE_KEY_PROMPTS, JSON.stringify(prompts));
                } catch (e) {
                    showToast('Gagal menyimpan data ke localStorage.', 'error');
                }
            }

            function checkExistingSession() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY_SESSION);
                    if (raw) {
                        const session = JSON.parse(raw);
                        if (session && session.username && session.role) {
                            currentSession = session;
                            showDashboard();
                            return;
                        }
                    }
                } catch (e) {
                    // Invalid session, ignore
                }
                showLogin();
            }

            function saveSession(session) {
                currentSession = session;
                try {
                    localStorage.setItem(STORAGE_KEY_SESSION, JSON.stringify(session));
                } catch (e) {
                    // Silently fail
                }
            }

            function clearSession() {
                currentSession = null;
                try {
                    localStorage.removeItem(STORAGE_KEY_SESSION);
                } catch (e) {
                    // Silently fail
                }
            }

            // ==================== VIEW SWITCHING ====================
            function showLogin() {
                loginScreen.style.display = '';
                loginScreen.style.animation = 'fadeSlideIn 0.5s var(--transition-spring)';
                dashboardScreen.classList.remove('active');
                dashboardScreen.style.display = 'none';
                usernameInput.value = '';
                passwordInput.value = '';
                loginError.textContent = '';
                usernameInput.focus();
            }

            function showDashboard() {
                if (!currentSession) return;
                loginScreen.style.animation = 'fadeSlideOut 0.25s ease forwards';
                setTimeout(() => {
                    loginScreen.style.display = 'none';
                    dashboardScreen.style.display = 'flex';
                    dashboardScreen.classList.add('active');
                    dashboardScreen.style.animation = 'fadeInUp 0.5s var(--transition-spring)';
                    updateDashboardUI();
                    renderPrompts();
                }, 240);
            }

            function updateDashboardUI() {
                if (!currentSession) return;
                displayUsername.textContent = currentSession.username;
                if (currentSession.role === 'admin') {
                    roleBadge.textContent = 'Admin';
                    roleBadge.className = 'role-badge role-admin';
                    uploadSection.classList.add('visible');
                } else {
                    roleBadge.textContent = 'User';
                    roleBadge.className = 'role-badge role-user';
                    uploadSection.classList.remove('visible');
                }
            }

            // ==================== AUTH ====================
            function handleLogin() {
                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();
                loginError.textContent = '';

                if (!username || !password) {
                    loginError.textContent = 'Harap isi username dan password.';
                    shakeElement(loginError);
                    return;
                }

                if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                    // Admin login
                    saveSession({ username, role: 'admin' });
                    showToast('Selamat datang, Admin! ✨', 'success');
                    showDashboard();
                } else {
                    loginError.textContent = 'Username atau password salah. Coba lagi.';
                    shakeElement(document.querySelector('.login-card'));
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            }

            function loginAsGuest() {
                saveSession({ username: 'UserBiasa', role: 'user' });
                showToast('Masuk sebagai User Biasa 👤', 'info');
                showDashboard();
            }

            function handleLogout() {
                clearSession();
                showToast('Anda telah logout.', 'info');
                showLogin();
                promptsGrid.innerHTML = '';
            }

            // ==================== CRUD ====================
            function handleUpload() {
                if (!currentSession || currentSession.role !== 'admin') {
                    showToast('Hanya admin yang dapat mengupload prompt.', 'error');
                    return;
                }
                const title = promptTitleInput.value.trim();
                const content = promptContentInput.value.trim();

                if (!title) {
                    showToast('Judul prompt tidak boleh kosong.', 'error');
                    promptTitleInput.focus();
                    shakeElement(promptTitleInput);
                    return;
                }
                if (!content) {
                    showToast('Isi prompt tidak boleh kosong.', 'error');
                    promptContentInput.focus();
                    shakeElement(promptContentInput);
                    return;
                }

                const newPrompt = {
                    id: generateId(),
                    title: title,
                    content: content,
                    date: new Date().toISOString(),
                    author: currentSession.username
                };

                prompts.unshift(newPrompt); // Add to beginning
                savePromptsToStorage();
                renderPrompts();

                // Clear inputs
                promptTitleInput.value = '';
                promptContentInput.value = '';
                promptTitleInput.focus();

                showToast('Prompt berhasil diupload! ✅', 'success');
            }

            function handleDelete(promptId) {
                if (!currentSession || currentSession.role !== 'admin') {
                    showToast('Hanya admin yang dapat menghapus prompt.', 'error');
                    return;
                }
                const prompt = prompts.find(p => p.id === promptId);
                if (!prompt) return;

                // Simple confirmation
                if (!confirm(`Hapus prompt "${prompt.title}"?\nTindakan ini tidak dapat dibatalkan.`)) return;

                prompts = prompts.filter(p => p.id !== promptId);
                savePromptsToStorage();
                renderPrompts();
                showToast('Prompt dihapus. 🗑️', 'info');
            }

            function handleCopy(promptId) {
                const prompt = prompts.find(p => p.id === promptId);
                if (!prompt) return;

                const textToCopy = `${prompt.title}\n\n${prompt.content}`;
                copyToClipboard(textToCopy)
                    .then(() => showToast('Teks disalin ke clipboard! 📋', 'success'))
                    .catch(() => showToast('Gagal menyalin teks.', 'error'));
            }

            function handleDownload(promptId) {
                const prompt = prompts.find(p => p.id === promptId);
                if (!prompt) return;

                const textContent = `${prompt.title}\n${'═'.repeat(prompt.title.length)}\n\n${prompt.content}\n\n— Disimpan dari Prompt Vault\n  Tanggal: ${formatDate(prompt.date)}`;
                const blob = new Blob([textContent], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);

                const safeFileName = prompt.title.replace(/[^a-zA-Z0-9_\-\s]/g, '').replace(/\s+/g, '_').substring(0,
                    60) || 'prompt';
                const downloadLink = document.createElement('a');
                downloadLink.href = url;
                downloadLink.download = `${safeFileName}.txt`;
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
                URL.revokeObjectURL(url);

                showToast('File .txt berhasil diunduh! 💾', 'success');
            }

            function toggleExpand(cardBodyEl, btnEl) {
                const isExpanded = cardBodyEl.classList.contains('expanded');
                if (isExpanded) {
                    cardBodyEl.classList.remove('expanded');
                    btnEl.textContent = 'Lihat Selengkapnya ▾';
                } else {
                    cardBodyEl.classList.add('expanded');
                    btnEl.textContent = 'Sembunyikan ▴';
                }
            }

            // ==================== RENDER ====================
            function renderPrompts() {
                promptCountEl.textContent = prompts.length;

                if (prompts.length === 0) {
                    promptsGrid.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <p>Belum ada prompt tersimpan.</p>
                            <p style="font-size:0.75rem;margin-top:4px;color:var(--text-tertiary);">
                                ${currentSession && currentSession.role === 'admin' ? 'Gunakan form di atas untuk mengupload prompt pertama.' : 'Admin akan menambahkan prompt segera.'}
                            </p>
                        </div>`;
                    return;
                }

                const isAdmin = currentSession && currentSession.role === 'admin';

                promptsGrid.innerHTML = prompts.map((p, index) => {
                    const dateFormatted = formatDate(p.date);
                    const contentPreview = escapeHTML(p.content);
                    const titleSafe = escapeHTML(p.title);
                    const isLongContent = p.content.length > 250;

                    return `
                        <div class="prompt-card" style="animation-delay:${index * 0.04}s;" data-id="${p.id}">
                            <div class="card-header">
                                <span class="card-title" title="${titleSafe}">${titleSafe}</span>
                                <span class="card-date">${dateFormatted}</span>
                            </div>
                            <div class="card-body${isLongContent ? '' : ' expanded'}" data-content-id="${p.id}">
                                ${contentPreview}
                            </div>
                            ${isLongContent ? `<button class="btn-action btn-expand" data-expand-id="${p.id}" onclick="window._toggleExpandCard('${p.id}')">Lihat Selengkapnya ▾</button>` : ''}
                            <div class="card-actions">
                                <button class="btn-action btn-copy" onclick="window._handleCopyCard('${p.id}')" title="Salin ke clipboard">
                                    📋 Salin
                                </button>
                                <button class="btn-action btn-download" onclick="window._handleDownloadCard('${p.id}')" title="Download sebagai .txt">
                                    💾 Download
                                </button>
                                ${isAdmin ? `
                                <button class="btn-action btn-delete" onclick="window._handleDeleteCard('${p.id}')" title="Hapus prompt">
                                    🗑️ Hapus
                                </button>` : ''}
                            </div>
                        </div>`;
                }).join('');

                // Re-bind expand listeners
                document.querySelectorAll('.btn-expand').forEach(btn => {
                    const expandId = btn.getAttribute('data-expand-id');
                    const cardBody = document.querySelector(`.card-body[data-content-id="${expandId}"]`);
                    if (cardBody && btn) {
                        btn.addEventListener('click', () => toggleExpand(cardBody, btn));
                    }
                });
            }

            // Global function references for inline onclick
            window._handleCopyCard = function(promptId) { handleCopy(promptId); };
            window._handleDownloadCard = function(promptId) { handleDownload(promptId); };
            window._handleDeleteCard = function(promptId) { handleDelete(promptId); };
            window._toggleExpandCard = function(promptId) {
                const cardBody = document.querySelector(`.card-body[data-content-id="${promptId}"]`);
                const btn = document.querySelector(`.btn-expand[data-expand-id="${promptId}"]`);
                if (cardBody && btn) toggleExpand(cardBody, btn);
            };

            // ==================== UTILS ====================
            function generateId() {
                return 'prm_' + Date.now().toString(36) + '_' + Math.random().toString(36).substring(2, 8);
            }

            function formatDate(isoString) {
                try {
                    const date = new Date(isoString);
                    const now = new Date();
                    const diffMs = now - date;
                    const diffMin = Math.floor(diffMs / 60000);
                    const diffHrs = Math.floor(diffMs / 3600000);
                    const diffDays = Math.floor(diffMs / 86400000);

                    if (diffMin < 1) return 'Baru saja';
                    if (diffMin < 60) return `${diffMin} menit lalu`;
                    if (diffHrs < 24) return `${diffHrs} jam lalu`;
                    if (diffDays < 7) return `${diffDays} hari lalu`;

                    const day = date.getDate().toString().padStart(2, '0');
                    const month = (date.getMonth() + 1).toString().padStart(2, '0');
                    const year = date.getFullYear();
                    return `${day}/${month}/${year}`;
                } catch (e) {
                    return isoString;
                }
            }

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function copyToClipboard(text) {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    return navigator.clipboard.writeText(text);
                }
                // Fallback
                return new Promise((resolve, reject) => {
                    try {
                        const textarea = document.createElement('textarea');
                        textarea.value = text;
                        textarea.style.position = 'fixed';
                        textarea.style.opacity = '0';
                        textarea.style.pointerEvents = 'none';
                        document.body.appendChild(textarea);
                        textarea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textarea);
                        resolve();
                    } catch (e) {
                        reject(e);
                    }
                });
            }

            function shakeElement(el) {
                if (!el) return;
                el.style.animation = 'none';
                el.offsetHeight; // trigger reflow
                el.style.animation = 'shake 0.45s ease';
                setTimeout(() => { el.style.animation = ''; }, 500);
            }

            // Inject shake keyframes
            const shakeStyle = document.createElement('style');
            shakeStyle.textContent = `
                @keyframes shake {
                    0%,100% { transform: translateX(0); }
                    15% { transform: translateX(-8px); }
                    30% { transform: translateX(8px); }
                    45% { transform: translateX(-6px); }
                    60% { transform: translateX(6px); }
                    75% { transform: translateX(-3px); }
                    90% { transform: translateX(3px); }
                }`;
            document.head.appendChild(shakeStyle);

            // ==================== TOAST ====================
            function showToast(message, type = 'info') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                const icons = { success: '✅', error: '❌', info: 'ℹ️' };
                toast.innerHTML = `<span>${icons[type] || 'ℹ️'}</span> ${message}`;
                toastContainer.appendChild(toast);

                // Auto remove after animation
                setTimeout(() => {
                    if (toast.parentNode) {
                        toast.remove();
                    }
                }, 3000);
            }

            // ==================== START ====================
            init();
        })();
    </script>
</body>
</html>
