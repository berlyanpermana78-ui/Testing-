<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trinity AI v1.0</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="liquid-bg">
        <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
    </div>

    <!-- Login Overlay -->
    <div id="loginOverlay" class="overlay active">
        <div class="login-box">
            <div class="logo-icon">T</div>
            <h1>Trinity AI</h1>
            <p>Sign in to continue</p>
            <div class="auth-options">
                <button id="googleLogin" class="btn-google">
                    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"></path><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"></path><path fill="#FBBC05" d="M5.84 14.09C5.71 13.3 la5.17 12.43C5.31 11.31 5 10.12 5 8.84S5.31 7.55 5.84 6.4 la5.17 12.43V10.12h-4.1z"></path><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3. kind 3.05 2.18 7.2l3.66 2.84c.39-.25.84-.41 1.34-.41z"></path></svg>
                    Continue with Google
                </button>
                <div class="divider"><span>or</span></div>
                <div class="input-group">
                    <input type="text" id="loginUser" placeholder="Username">
                </div>
                <div class="input-group">
                    <input type="password" id="loginPass" placeholder="Password">
                </div>
                <button id="loginBtn" class="btn-primary">Login</button>
            </div>
        </div>
    </div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="user-profile">
                    <div class="avatar">T</div>
                    <div class="user-info">
                        <span class="username" id="dispUser">Trinity User</span>
                        <span class="user-role">Pro Account</span>
                    </div>
                </div>
                <div class="ai-meta">
                    <span class="ai-name">Trinity AI</span>
                    <span class="ai-version">v1.0.0-Stable</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-item active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
                    Chat
                </div>
                <div class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    Profile
                </div>
                <div class="nav-item logout" id="logoutBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Logout
                </div>
            </nav>

            <div class="server-health">
                <div class="health-title">System Health</div>
                <div class="health-card">
                    <div class="health-line" id="healthLine"></div>
                    <div class="health-details">
                        <div class="row"><span>Status:</span> <span id="statusVal">Online</span></div>
                        <div class="row"><span>Latency:</span> <span id="latencyVal">--</span></div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <button id="menuToggle" class="menu-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="mode-pill">
                    <div class="pill-option active" data-mode="agent">Agent</div>
                    <div class="pill-option" data-mode="daily">Daily</div>
                </div>
                <div class="header-status">
                    <span class="version">v1.0</span>
                </div>
            </header>

            <div class="chat-window" id="chatWindow">
                <div class="message ai-msg">Hello. I am Trinity AI v1.0. How can I assist you today?</div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <div class="chips">
                        <div class="chip">Berpikir</div>
                        <div class="chip">Cari</div>
                    </div>
                    <div class="input-box">
                        <input type="text" id="userInput" placeholder="Message Trinity AI..." autocomplete="off">
                        <button id="sendBtn">
                            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
